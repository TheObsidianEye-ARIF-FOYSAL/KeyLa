name: Deploy Keyla web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "keyla_v1/**"
      - "landing/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"

      - name: Install dependencies
        working-directory: keyla_v1
        run: flutter pub get

      # Downloads libsodium's sodium.js into keyla_v1/web/ and injects the
      # <script> tag. Without it the app hangs at the splash screen on web,
      # because SodiumSumoInit.init() has no libsodium binding to attach to.
      - name: Fetch sodium.js for web
        working-directory: keyla_v1
        run: dart run sodium_libs:update_web

      - name: Build web
        working-directory: keyla_v1
        run: flutter build web --release --base-href /KeyLa/app/

      - name: Assemble Pages site (landing page at root, Flutter app under /app)
        run: |
          mkdir -p site/app
          cp -r landing/. site/
          cp -r keyla_v1/build/web/. site/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
